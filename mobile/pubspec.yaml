name: mensajeria_app
description: "App móvil del sistema de mensajería corporativa - Examen UPB"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # ──── Firebase ────
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # ──── State management ────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ──── Navegación ────
  go_router: ^14.3.0

  # ──── Networking ────
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # ──── Storage ────
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # ──── Modelos / serialización ────
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # ──── UI / imágenes ────
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0
  shimmer: ^3.0.0

  # ──── Animaciones ────
  animations: ^2.0.11

  # ──── Login social (Adicional 2) ────
  flutter_facebook_auth: ^7.1.1

  # ──── Utilidades ────
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ──── Linting ────
  flutter_lints: ^4.0.0
  custom_lint: ^0.6.7
  riverpod_lint: ^2.3.13

  # ──── Code generation ────
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
